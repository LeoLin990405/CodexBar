name: Auto-Sync Upstream

# Goal: best-effort, no-LLM sync of upstream/main into feat/trae-dollar-usage.
# - Clean merge ⇒ open a PR for human review (never push directly to the long-lived branch).
# - Merge conflict ⇒ delete the working branch and surface details via an issue
#   (the smart-sync workflow with Claude Code can take over from there).

on:
  schedule:
    - cron: '0 1,13 * * *'   # 09:00 / 21:00 Asia/Shanghai
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Fork branch to sync into'
        required: false
        default: 'feat/trae-dollar-usage'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch || 'feat/trae-dollar-usage' }}

      - name: Configure git
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/steipete/CodexBar.git || true
          git fetch upstream main

      - name: Check whether upstream is ahead
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          AHEAD=$(git rev-list --count upstream/main..HEAD)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "ahead=$AHEAD"   >> "$GITHUB_OUTPUT"
          UP_SHORT=$(git rev-parse --short upstream/main)
          echo "upstream_sha=$UP_SHORT" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" = "0" ]; then
            echo "Branch is already at or ahead of upstream/main; nothing to do."
          else
            echo "Branch is $BEHIND commit(s) behind upstream/main."
            git log --oneline HEAD..upstream/main | head -20
          fi

      - name: Try clean merge on a working branch
        id: merge
        if: steps.check.outputs.behind != '0'
        run: |
          WORK_BRANCH="auto/sync-upstream-${{ steps.check.outputs.upstream_sha }}"
          echo "work_branch=$WORK_BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -B "$WORK_BRANCH"
          if git merge --no-edit upstream/main; then
            echo "result=clean" >> "$GITHUB_OUTPUT"
          else
            git merge --abort || true
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push working branch and open PR
        if: steps.merge.outputs.result == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH='${{ steps.merge.outputs.work_branch }}'
          TARGET='${{ github.event.inputs.target_branch || 'feat/trae-dollar-usage' }}'
          # Skip if the working branch carries no new file changes after merge
          if git diff --quiet "origin/$TARGET" "$BRANCH"; then
            echo "Working branch identical to $TARGET; nothing to PR."
            exit 0
          fi
          git push -u origin "$BRANCH"
          # Reuse an existing open PR if one was already created for this sha
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR already open: #$EXISTING"
            exit 0
          fi
          gh pr create \
            --base "$TARGET" \
            --head "$BRANCH" \
            --title "Auto-sync upstream/main (${{ steps.check.outputs.upstream_sha }}) into $TARGET" \
            --body "Automated merge of \`upstream/main\` at \`${{ steps.check.outputs.upstream_sha }}\` into \`$TARGET\`.

            Commits merged in: ${{ steps.check.outputs.behind }}

            ### Reviewer checklist
            - [ ] Skim the upstream commits for new user-facing English strings.
            - [ ] Run \`make check\` locally if non-trivial files changed.
            - [ ] Confirm Build CodexBar App + CI both pass on this PR.

            Generated by \`.github/workflows/auto-sync-upstream.yml\`."

      - name: Open issue on conflict
        if: steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v8
        with:
          script: |
            const upstream = '${{ steps.check.outputs.upstream_sha }}';
            const behind   = '${{ steps.check.outputs.behind }}';
            const target   = '${{ github.event.inputs.target_branch || 'feat/trae-dollar-usage' }}';
            const title = `Upstream sync conflict at ${upstream}`;
            const body = `Automated merge of \`upstream/main@${upstream}\` into \`${target}\` could not complete cleanly (${behind} commit(s) behind).

            **Next step**: have Claude (smart-sync workflow, or local \`claude code\` in this repo) resolve the conflicts and open a PR manually.

            *Triggered by \`.github/workflows/auto-sync-upstream.yml\`*`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync,conflict',
              state: 'open'
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still conflicting at \`${upstream}\` (${behind} commits behind).`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-sync', 'conflict']
              });
            }
